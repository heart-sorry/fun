name: Check Secret

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "GIST_TOKEN length: ${#GIST_TOKEN}"
          echo "GIST_TOKEN first 4 chars: ${GIST_TOKEN:0:4}"
          if [ -z "$GIST_TOKEN" ]; then
            echo "ERROR: GIST_TOKEN is empty or not set!"
            exit 1
          else
            echo "OK: GIST_TOKEN is set"
          fi
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
