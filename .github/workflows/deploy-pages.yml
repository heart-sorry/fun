name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Gist Token
        run: |
          if [ -z "$GIST_TOKEN" ]; then
            echo "Warning: GIST_TOKEN secret not set, leaving empty"
          else
            sed -i "s/const GIST_TOKEN = '';/const GIST_TOKEN = '$GIST_TOKEN';/" index.html
            echo "Token injected: ${GIST_TOKEN:0:4}..."
          fi
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
