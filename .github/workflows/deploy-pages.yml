name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Gist Token
        run: |
          if [ -z "$GIST_TOKEN" ]; then
            echo "::warning::GIST_TOKEN secret is empty or not set"
            echo "Checking if const GIST_TOKEN line exists..."
            grep -n "const GIST_TOKEN" index.html || echo "NOT FOUND"
          else
            echo "Token found, length: ${#GIST_TOKEN}"
            sed -i "s/const GIST_TOKEN = ''/const GIST_TOKEN = '$GIST_TOKEN'/" index.html
            echo "After injection:"
            grep "const GIST_TOKEN" index.html | cut -c1-40
          fi
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
