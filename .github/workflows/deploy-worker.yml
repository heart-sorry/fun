name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'fun.js'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Configure Wrangler
        run: |
          wrangler config ${{ secrets.CF_API_TOKEN }}
          wrangler whoami
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          
      - name: Deploy Worker
        run: wrangler deploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
