name: Hourly Gist Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GIST_TOKEN }}

      - name: Sync from Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: cf38eea9cb4db23811ff60fdd6d6cec3
        run: |
          curl -s -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          c = d['files']['data.json']['content']
          p = json.loads(c)
          with open('data.json','w',encoding='utf-8') as f:
              json.dump(p, f, ensure_ascii=False, indent=2)
          print('Synced', len(p.get('messages',[])), 'msgs,', len(p.get('friends',[])), 'friends')
          "

      - name: Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || {
            git commit -m "hourly sync $(date -u +%Y-%m-%dT%H:%M)"
            git push
          }
