name: Sync Messages

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest messages from Gist
        id: gist
        uses: actions/github-script@v7
        with:
          script: |
            const GIST_ID = '70e5eee6b9ac06d27956f639a6efb9e3';
            const TOKEN = '${{ secrets.GIST_TOKEN }}';
            
            async function fetchGist(path, method, body) {
              const res = await fetch(`https://api.github.com/gists/${GIST_ID}${path}`, {
                method,
                headers: {
                  'Authorization': `Bearer ${TOKEN}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json'
                },
                body: body ? JSON.stringify(body) : undefined
              });
              return res.json();
            }

            const gist = await fetchGist('', 'GET');
            const content = gist.files['messages.json'].content;
            const messages = JSON.parse(content);
            
            core.setOutput('messages', JSON.stringify(messages));
            core.setOutput('count', messages.length);
            console.log('Gist has', messages.length, 'messages');

      - name: Show message count
        run: echo "Latest message count: ${{ steps.gist.outputs.count }}"
