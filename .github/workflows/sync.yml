name: Sync Data

on:
  schedule:
    # 每小时自动同步一次
    - cron: '0 * * * *'
  workflow_dispatch:
    # 手动触发：https://github.com/heart-sorry/fun/actions/workflows/sync.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          persist-credentials: false

      - name: Fetch & update data.json
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: cf38eea9cb4db23811ff60fdd6d6cec3
        run: |
          response=$(curl -s -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$GIST_ID")
          echo "$response" | python3 -c "
import sys, json, os
d = json.load(sys.stdin)
content = d['files']['data.json']['content']
parsed = json.loads(content)
messages = parsed.get('messages', [])
friends = parsed.get('friends', [])
with open('data.json', 'w', encoding='utf-8') as f:
    json.dump({
        'messages': messages,
        'friends': friends,
        'syncedAt': os.environ.get('SYNC_TIME', '')
    }, f, ensure_ascii=False, indent=2)
print('Fetched: {} messages, {} friends'.format(len(messages), len(friends)))
"
          echo "SYNC_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot@users.noreply.github.com]"
          git add data.json
          git diff --quiet --cached && echo "No changes" || {
            git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M')"
            git push origin gh-pages
            echo "Pushed data.json to gh-pages"
          }
