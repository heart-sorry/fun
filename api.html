<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messages API</title>
</head>
<body>
<script>
// 读取留言：直接返回 Gist raw 文件（公开可读）
const GIST_ID = 'cf38eea9cb4db23811ff60fdd6d6cec3';
const RAW_URL = 'https://gist.githubusercontent.com/heart-sorry/' + GIST_ID + '/raw/messages.json';

(async () => {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (res.ok) {
      const msgs = await res.json();
      document.open();
      document.write('<pre>' + JSON.stringify(msgs) + '</pre>');
      document.close();
    } else {
      document.open();
      document.write('<pre>[]</pre>');
      document.close();
    }
  } catch (e) {
    document.open();
    document.write('<pre>[]</pre>');
    document.close();
  }
})();
</script>
</body>
</html>
