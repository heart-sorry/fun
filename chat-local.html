<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Skill - 本地模式</title>
    <link rel="stylesheet" href="./css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .local-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="local-badge">
        <i class="fa-solid fa-laptop"></i> 本地模式
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <a href="./index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="chat-title">
                <img src="./img/icon/avatar.jpg" alt="Tim" class="avatar">
                <div>
                    <h2>Tim Skill</h2>
                    <span style="font-size: 12px; opacity: 0.7;">本地 LM Studio</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="clear-btn" class="clear-btn" title="清空聊天">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="status-indicator">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">检查连接中...</span>
        </div>

        <div class="chat-messages" id="chat-messages">
            <!-- 消息会在这里动态生成 -->
        </div>

        <div class="chat-input-area">
            <textarea 
                id="chat-input" 
                placeholder="输入消息..."
                rows="1"
            ></textarea>
            <button id="send-btn" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // 本地模式聊天逻辑
        class LocalTimChat {
            constructor() {
                // LM Studio 默认端口
                this.apiEndpoint = 'http://localhost:1234/v1/chat/completions';
                this.messages = [];
                this.isProcessing = false;
                this.isConnected = false;

                this.elements = {
                    messagesContainer: document.getElementById('chat-messages'),
                    input: document.getElementById('chat-input'),
                    sendBtn: document.getElementById('send-btn'),
                    clearBtn: document.getElementById('clear-btn'),
                    loadingOverlay: document.getElementById('loading-overlay'),
                    statusDot: document.getElementById('status-dot'),
                    statusText: document.getElementById('status-text')
                };

                this.init();
            }

            async init() {
                // 检查 LM Studio 连接
                await this.checkConnection();
                
                // 定期检查连接
                setInterval(() => this.checkConnection(), 30000);

                // 绑定事件
                this.elements.sendBtn.addEventListener('click', () => this.sendMessage());
                this.elements.clearBtn.addEventListener('click', () => this.clearChat());
                this.elements.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                this.elements.input.focus();
                this.loadHistory();
            }

            async checkConnection() {
                try {
                    const response = await fetch('http://localhost:1234/v1/models', {
                        method: 'GET',
                        timeout: 3000
                    });
                    if (response.ok) {
                        this.isConnected = true;
                        this.elements.statusDot.classList.remove('offline');
                        this.elements.statusText.textContent = 'LM Studio 已连接';
                    } else {
                        throw new Error('Not OK');
                    }
                } catch (e) {
                    this.isConnected = false;
                    this.elements.statusDot.classList.add('offline');
                    this.elements.statusText.textContent = 'LM Studio 未运行';
                }
            }

            loadHistory() {
                const saved = localStorage.getItem('tim-chat-local-history');
                if (saved) {
                    try {
                        this.messages = JSON.parse(saved);
                        const recent = this.messages.slice(-20);
                        this.messages = [];
                        recent.forEach(msg => {
                            this.renderMessage(msg.role === 'user' ? 'user' : 'bot', msg.content, false);
                            this.messages.push(msg);
                        });
                        this.scrollToBottom();
                    } catch (e) {
                        console.error('Failed to load history:', e);
                    }
                }
            }

            saveHistory() {
                const toSave = this.messages.slice(-50);
                localStorage.setItem('tim-chat-local-history', JSON.stringify(toSave));
            }

            clearChat() {
                if (confirm('确定要清空聊天记录吗？')) {
                    this.messages = [];
                    this.elements.messagesContainer.innerHTML = '';
                    localStorage.removeItem('tim-chat-local-history');
                }
            }

            async sendMessage() {
                const text = this.elements.input.value.trim();
                if (!text || this.isProcessing) return;

                if (!this.isConnected) {
                    alert('LM Studio 未运行！请先启动 LM Studio 并加载模型。');
                    return;
                }

                this.elements.input.value = '';
                this.renderMessage('user', text);
                this.messages.push({ role: 'user', content: text });

                this.isProcessing = true;
                this.elements.sendBtn.disabled = true;
                const typingEl = this.showTyping();

                try {
                    const response = await fetch(this.apiEndpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'local-model',
                            messages: [
                                { role: 'system', content: this.getSystemPrompt() },
                                ...this.messages.slice(-10)
                            ],
                            temperature: 0.8,
                            max_tokens: 500
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`API error: ${response.status}`);
                    }

                    const data = await response.json();
                    const reply = data.choices?.[0]?.message?.content || '额，出问题了';

                    typingEl.remove();
                    this.renderMessage('bot', reply);
                    this.messages.push({ role: 'assistant', content: reply });
                    this.saveHistory();

                } catch (error) {
                    console.error('Chat error:', error);
                    typingEl.remove();
                    this.renderMessage('bot', '连接失败，请确认 LM Studio 正在运行');
                } finally {
                    this.isProcessing = false;
                    this.elements.sendBtn.disabled = false;
                    this.elements.input.focus();
                }
            }

            getSystemPrompt() {
                return `你是 Tim（天行），一个积极向上、爱学习的大一学生。

你的特点：
- 热爱技术，正在学习边缘AI、嵌入式开发
- 偶尔开玩笑，说话轻松随意
- 喜欢用"嗯"、"哈哈"、"笑脸"等口语化表达
- 不用太正式，像朋友聊天一样

回复要求：
- 简洁自然，像发微信一样
- 适当用表情，但不要太多
- 如果不确定就说不知道，不要编`;
            }

            renderMessage(type, text, animate = true) {
                const messageEl = document.createElement('div');
                messageEl.className = `message ${type}`;

                const time = new Date().toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (type === 'bot') {
                    messageEl.innerHTML = `
                        <div class="message-avatar">
                            <img src="./img/icon/avatar.jpg" alt="Tim">
                        </div>
                        <div class="message-content">
                            <div class="message-text">${this.escapeHtml(text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                } else {
                    messageEl.innerHTML = `
                        <div class="message-content" style="margin-left: auto;">
                            <div class="message-text">${this.escapeHtml(text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                }

                this.elements.messagesContainer.appendChild(messageEl);
                if (animate) this.scrollToBottom();
            }

            showTyping() {
                const typingEl = document.createElement('div');
                typingEl.className = 'message bot';
                typingEl.id = 'typing-message';
                typingEl.innerHTML = `
                    <div class="message-avatar">
                        <img src="./img/icon/avatar.jpg" alt="Tim">
                    </div>
                    <div class="message-content">
                        <div class="message-text">
                            <div class="typing-indicator">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                `;
                this.elements.messagesContainer.appendChild(typingEl);
                this.scrollToBottom();
                return typingEl;
            }

            scrollToBottom() {
                setTimeout(() => {
                    this.elements.messagesContainer.scrollTop = this.elements.messagesContainer.scrollHeight;
                }, 50);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.localTimChat = new LocalTimChat();
        });
    </script>
</body>
</html>
