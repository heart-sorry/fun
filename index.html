<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我想对你说的话 💌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 30%, #a1c4fd 70%, #c2e9fb 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
    }

    /* 漂浮的小爱心 */
    .hearts {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    /* 主体 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }
    header .emoji-big { font-size: 4rem; display: block; margin-bottom: 12px; }
    header h1 {
      font-size: 2.4rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
      margin-bottom: 10px;
    }
    header p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
    }

    /* 卡片网格 */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      opacity: 0.12;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,0.14);
    }

    /* 每张卡片不同颜色 */
    .card:nth-child(1)  { border-top: 4px solid #ff6b9d; }
    .card:nth-child(1)::before { background: #ff6b9d; }
    .card:nth-child(2)  { border-top: 4px solid #ffa94d; }
    .card:nth-child(2)::before { background: #ffa94d; }
    .card:nth-child(3)  { border-top: 4px solid #69db7c; }
    .card:nth-child(3)::before { background: #69db7c; }
    .card:nth-child(4)  { border-top: 4px solid #74c0fc; }
    .card:nth-child(4)::before { background: #74c0fc; }
    .card:nth-child(5)  { border-top: 4px solid #da77f2; }
    .card:nth-child(5)::before { background: #da77f2; }
    .card:nth-child(6)  { border-top: 4px solid #f783ac; }
    .card:nth-child(6)::before { background: #f783ac; }

    .card .avatar {
      font-size: 3rem;
      margin-bottom: 14px;
      display: block;
    }
    .card .name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }
    .card .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(0,0,0,0.06);
      color: #666;
      margin-bottom: 16px;
    }
    .card .message {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.8;
      font-style: italic;
    }
    .card .message::before { content: '"'; font-size: 1.4rem; color: #ccc; line-height: 0; vertical-align: -6px; margin-right: 2px; }
    .card .message::after  { content: '"'; font-size: 1.4rem; color: #ccc; line-height: 0; vertical-align: -6px; margin-left: 2px; }

    /* 弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 28px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.18);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal .m-avatar { font-size: 4rem; margin-bottom: 12px; }
    .modal .m-name   { font-size: 1.8rem; font-weight: 700; color: #333; margin-bottom: 8px; }
    .modal .m-tag    { font-size: 0.85rem; color: #999; margin-bottom: 24px; }
    .modal .m-text   { font-size: 1.05rem; color: #444; line-height: 2; }
    .modal .close-btn {
      margin-top: 28px;
      padding: 10px 32px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #fcb69f, #a1c4fd);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal .close-btn:hover { opacity: 0.85; }

    footer {
      text-align: center;
      margin-top: 70px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- 漂浮爱心 -->
<div class="hearts" id="hearts"></div>

<div class="container">
  <header>
    <span class="emoji-big">💌</span>
    <h1>我想对你说的话</h1>
    <p>点开属于你的那张卡片，看看我想对你说什么 ✨</p>
  </header>

  <div class="cards" id="cards">
    <!-- 卡片由 JS 渲染 -->
  </div>

  <footer>
    <p>用心写给每一个你 🌸</p>
  </footer>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="m-avatar" id="m-avatar"></div>
    <div class="m-name"   id="m-name"></div>
    <div class="m-tag"    id="m-tag"></div>
    <div class="m-text"   id="m-text"></div>
    <button class="close-btn" onclick="document.getElementById('modal').classList.remove('active')">关闭 💫</button>
  </div>
</div>

<script>
// =============================================
// 👇 在这里填写你的朋友信息
// =============================================
const friends = [
  {
    avatar: "🌟",
    name: "朋友A",
    tag: "最好的朋友",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友A 的心里话）"
  },
  {
    avatar: "🌈",
    name: "朋友B",
    tag: "老朋友",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友B 的心里话）"
  },
  {
    avatar: "🎵",
    name: "朋友C",
    tag: "音乐搭子",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友C 的心里话）"
  },
  {
    avatar: "☕",
    name: "朋友D",
    tag: "咖啡搭子",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友D 的心里话）"
  },
  {
    avatar: "🎮",
    name: "朋友E",
    tag: "游戏搭子",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友E 的心里话）"
  },
  {
    avatar: "🌸",
    name: "朋友F",
    tag: "闺蜜",
    preview: "点击查看我想对你说的话...",
    message: "（这里填写你对 朋友F 的心里话）"
  }
];
// =============================================

// 渲染卡片
const cardsEl = document.getElementById('cards');
friends.forEach((f, i) => {
  cardsEl.innerHTML += `
    <div class="card" onclick="openModal(${i})">
      <span class="avatar">${f.avatar}</span>
      <div class="name">${f.name}</div>
      <span class="tag">${f.tag}</span>
      <div class="message">${f.preview}</div>
    </div>`;
});

// 弹窗
function openModal(i) {
  const f = friends[i];
  document.getElementById('m-avatar').textContent = f.avatar;
  document.getElementById('m-name').textContent   = f.name;
  document.getElementById('m-tag').textContent    = f.tag;
  document.getElementById('m-text').textContent   = f.message;
  document.getElementById('modal').classList.add('active');
}
function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('active');
}

// 漂浮爱心
const emojis = ['💖','💕','✨','🌸','💫','🎀','💝','🌟'];
const heartsEl = document.getElementById('hearts');
for (let i = 0; i < 18; i++) {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  h.style.left     = Math.random() * 100 + 'vw';
  h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
  h.style.animationDuration  = (6 + Math.random() * 10) + 's';
  h.style.animationDelay     = (Math.random() * 8) + 's';
  heartsEl.appendChild(h);
}
</script>
</body>
</html>
