<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>致你的私语 💌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 8px;
    }
    header p {
      font-size: 0.95rem;
      color: #666;
    }

    .search-box {
      position: relative;
      margin-bottom: 30px;
    }
    .search-box input {
      width: 100%;
      padding: 16px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      outline: none;
    }
    .search-box input::placeholder {
      color: #aaa;
    }

    .results {
      display: none;
    }
    .results.active { display: block; }

    .result-item {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .result-item:hover {
      transform: translateY(-2px);
    }
    .result-item .r-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .result-item .r-avatar {
      font-size: 2rem;
    }
    .result-item .r-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
    }
    .result-item .r-tag {
      font-size: 0.75rem;
      color: #888;
    }
    .result-item .r-preview {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .not-found {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    .not-found.active { display: block; }

    .hint {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-top: 20px;
    }

    /* 弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal .m-avatar { font-size: 3rem; margin-bottom: 8px; }
    .modal .m-name   { font-size: 1.4rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    .modal .m-tag    { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
    .modal .m-text   { font-size: 1rem; color: #444; line-height: 2; text-align: left; }
    .modal .close-btn {
      margin-top: 24px;
      padding: 10px 32px;
      border: none;
      border-radius: 25px;
      background: #333;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }

    /* 管理入口 */
    .admin-link {
      text-align: center;
      margin-top: 40px;
      opacity: 0.3;
      font-size: 0.75rem;
      color: #999;
      cursor: pointer;
    }
    .admin-link:hover { opacity: 0.6; }

    /* 管理后台 */
    .admin-panel {
      display: none;
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .admin-panel.active { display: block; }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .admin-header h2 { font-size: 1.1rem; color: #333; }
    .admin-header button {
      padding: 6px 14px;
      border: none;
      border-radius: 12px;
      background: #f5f5f5;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .friend-list { display: flex; flex-direction: column; gap: 10px; }
    .friend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 12px;
      cursor: pointer;
    }
    .friend-item .f-avatar { font-size: 1.4rem; }
    .friend-item .f-name { flex: 1; font-size: 0.95rem; color: #333; }
    .friend-item .f-edit { font-size: 0.8rem; opacity: 0.5; }

    .edit-form {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 12px;
    }
    .edit-form.active { display: block; }
    .edit-form input,
    .edit-form textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .edit-form textarea { min-height: 80px; resize: none; }
    .edit-form .btns { display: flex; gap: 8px; }
    .edit-form button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .edit-form .save { background: #333; color: #fff; }
    .edit-form .cancel { background: #ddd; color: #666; }
    .edit-form .delete { background: #ff4757; color: #fff; }

    .export-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: #f0f0f0;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>致你的私语 💌</h1>
    <p>致我们共同的回忆</p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索名字..." autocomplete="off">
  </div>

  <div class="results" id="results"></div>
  <div class="not-found" id="notFound">
    <p>没有找到这个名字哦</p>
  </div>

  <div class="hint" id="hint">在这里留下我们的回忆</div>

  <!-- 管理后台 -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <h2>🛠️ 管理</h2>
      <button onclick="logoutAdmin()">退出</button>
    </div>
    <div class="friend-list" id="friendList"></div>
    <div class="edit-form" id="editForm">
      <input type="hidden" id="editIndex">
      <input type="text" id="editAvatar" placeholder="头像 emoji">
      <input type="text" id="editName" placeholder="名字">
      <input type="text" id="editTag" placeholder="标签">
      <textarea id="editMessage" placeholder="想对TA说的话"></textarea>
      <div class="btns">
        <button class="save" onclick="saveFriend()">保存</button>
        <button class="delete" onclick="deleteFriend()">删除</button>
        <button class="cancel" onclick="cancelEdit()">取消</button>
      </div>
    </div>
    <button class="export-btn" onclick="copyData()">📋 复制数据</button>
  </div>

  <div class="admin-link" id="adminLink" onclick="showAdmin()">.</div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="m-avatar" id="m-avatar"></div>
    <div class="m-name"   id="m-name"></div>
    <div class="m-tag"    id="m-tag"></div>
    <div class="m-text"  id="m-text"></div>
    <button class="close-btn" onclick="document.getElementById('modal').classList.remove('active')">收到</button>
  </div>
</div>

<script>
// 数据
let friends = [
  { avatar: "🌟", name: "朋友A", tag: "最好的朋友", message: "（这里填写心里话）" },
  { avatar: "🌈", name: "朋友B", tag: "老朋友", message: "（这里填写心里话）" },
  { avatar: "🎵", name: "朋友C", tag: "音乐搭子", message: "（这里填写心里话）" }
];

const ADMIN_PASSWORD = "5201314";

const searchInput = document.getElementById('searchInput');
const resultsEl = document.getElementById('results');
const notFoundEl = document.getElementById('notFound');
const adminPanel = document.getElementById('adminPanel');
const hintEl = document.getElementById('hint');

// 搜索
searchInput.addEventListener('input', (e) => {
  const query = e.target.value.trim();
  
  if (query === ADMIN_PASSWORD) {
    showAdmin();
    return;
  }
  
  if (!query) {
    resultsEl.classList.remove('active');
    notFoundEl.classList.remove('active');
    hintEl.style.display = 'block';
    return;
  }
  
  hintEl.style.display = 'none';
  const matches = friends.filter(f => 
    f.name.toLowerCase().includes(query.toLowerCase())
  );
  
  if (matches.length === 0) {
    resultsEl.classList.remove('active');
    notFoundEl.classList.add('active');
  } else {
    notFoundEl.classList.remove('active');
    resultsEl.innerHTML = matches.map(f => `
      <div class="result-item" onclick="openModal(${friends.indexOf(f)})">
        <div class="r-top">
          <span class="r-avatar">${f.avatar}</span>
          <div>
            <div class="r-name">${f.name}</div>
            <div class="r-tag">${f.tag}</div>
          </div>
        </div>
        <div class="r-preview">${f.message.substring(0, 30)}...</div>
      </div>
    `).join('');
    resultsEl.classList.add('active');
  }
});

// 回车搜索
searchInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const query = searchInput.value.trim();
    if (query === ADMIN_PASSWORD) {
      showAdmin();
    } else {
      const match = friends.find(f => f.name.toLowerCase().includes(query.toLowerCase()));
      if (match) openModal(friends.indexOf(match));
    }
  }
});

// 弹窗
function openModal(i) {
  const f = friends[i];
  document.getElementById('m-avatar').textContent = f.avatar;
  document.getElementById('m-name').textContent = f.name;
  document.getElementById('m-tag').textContent = f.tag;
  document.getElementById('m-text').textContent = f.message;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('active');
}

// 管理后台
function showAdmin() {
  searchInput.value = '';
  resultsEl.classList.remove('active');
  notFoundEl.classList.remove('active');
  hintEl.style.display = 'none';
  adminPanel.classList.add('active');
  renderFriends();
}

function logoutAdmin() {
  adminPanel.classList.remove('active');
  hintEl.style.display = 'block';
}

function renderFriends() {
  document.getElementById('friendList').innerHTML = friends.map((f, i) => `
    <div class="friend-item" onclick="editFriend(${i})">
      <span class="f-avatar">${f.avatar}</span>
      <span class="f-name">${f.name}</span>
      <span class="f-edit">✏️</span>
    </div>
  `).join('');
}

function editFriend(i) {
  const f = friends[i];
  document.getElementById('editIndex').value = i;
  document.getElementById('editAvatar').value = f.avatar;
  document.getElementById('editName').value = f.name;
  document.getElementById('editTag').value = f.tag;
  document.getElementById('editMessage').value = f.message;
  document.getElementById('editForm').classList.add('active');
}

function saveFriend() {
  const i = parseInt(document.getElementById('editIndex').value);
  friends[i] = {
    avatar: document.getElementById('editAvatar').value || '👤',
    name: document.getElementById('editName').value || '未命名',
    tag: document.getElementById('editTag').value || '',
    message: document.getElementById('editMessage').value || ''
  };
  cancelEdit();
  renderFriends();
  alert('保存成功！点击"复制数据"发给我帮你更新网站～');
}

function cancelEdit() {
  document.getElementById('editForm').classList.remove('active');
}

function deleteFriend() {
  const i = parseInt(document.getElementById('editIndex').value);
  if (confirm('确定删除？')) {
    friends.splice(i, 1);
    cancelEdit();
    renderFriends();
  }
}

function copyData() {
  const data = `const friends = ${JSON.stringify(friends, null, 2)};`;
  navigator.clipboard.writeText(data).then(() => {
    alert('✅ 已复制！发给我帮你更新网站～');
  });
}
</script>
</body>
</html>
